spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=admin123

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

spring.h2.console.path=/h2-console
spring.h2.console.enabled=true

logging.level.com.bankapp=DEBUG

spring.jpa.show-sql=true
server.port=8080
jwt.secret=Y2hhbmdlVGhpc0luUHJvZHVjdGlvbkJhbmtBcHBTZWNyZXRLZXkyMDI0
jwt.expiration=86400000
debit.eligibility.url=http://localhost:8089

# Circuit Breaker: debitEligibility
# Opens after 50% failures in a 10-call sliding window
resilience4j.circuitbreaker.instances.debitEligibility.sliding-window-size=10
resilience4j.circuitbreaker.instances.debitEligibility.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.debitEligibility.wait-duration-in-open-state=10s

# Half-open: probe with 3 calls before closing again
resilience4j.circuitbreaker.instances.debitEligibility.permitted-number-of-calls-in-half-open-state=3
